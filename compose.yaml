services:
  webhook-api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info
      GITHUB_WEBHOOK_SECRET: replace-with-a-strong-shared-secret
      GITHUB_TOKEN:
      AWS_REGION: us-east-1
      POLICY_EVENTS_TOPIC_ARN:
      POLICY_RULES_TABLE_NAME:
      POLICY_RUNS_TABLE_NAME:
      UI_CORS_ORIGIN: http://localhost:5173
    ports:
      - "3000:3000"
