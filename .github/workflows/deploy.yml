name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
      ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}
      ECS_SERVICE_NAME: ${{ vars.ECS_SERVICE_NAME }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Validate deploy config
        run: |
          test -n "$AWS_REGION" || (echo "Missing GitHub variable: AWS_REGION" && exit 1)
          test -n "$ECR_REPOSITORY_URL" || (echo "Missing GitHub variable: ECR_REPOSITORY_URL" && exit 1)
          test -n "$ECS_CLUSTER_NAME" || (echo "Missing GitHub variable: ECS_CLUSTER_NAME" && exit 1)
          test -n "$ECS_SERVICE_NAME" || (echo "Missing GitHub variable: ECS_SERVICE_NAME" && exit 1)

      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: docker/setup-buildx-action@v3

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REPOSITORY_URL }}:latest
            ${{ env.ECR_REPOSITORY_URL }}:${{ github.sha }}

      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER_NAME" \
            --service "$ECS_SERVICE_NAME" \
            --force-new-deployment
